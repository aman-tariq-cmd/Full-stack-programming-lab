<style>
        .dot-pattern {
            background-image: radial-gradient(circle, #3D3D47 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.05;
        }
        .error-numeral {
            font-size: 140px;
            line-height: 1;
            font-weight: 700;
            background: linear-gradient(135deg, #a5c8ff 0%, #49e095 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }
        @media (max-width: 768px) {
            .error-numeral {
                font-size: 80px;
            }
        }
        .glow-effect {
            box-shadow: 0 0 80px 20px rgba(77, 158, 255, 0.05);
        }
    </style>

<body class="bg-background text-on-background font-body text-body selection:bg-primary-container selection:text-on-primary-container m-0 p-0 overflow-hidden">
<!-- Background Pattern -->
<div class="fixed inset-0 dot-pattern pointer-events-none"></div>
<!-- Ambient Blur Glows -->
<div class="fixed top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary opacity-5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-5%] w-[40%] h-[40%] bg-secondary opacity-5 blur-[120px] rounded-full pointer-events-none"></div>
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-lg text-center">
<!-- Animated Container -->
<div class="opacity-0 translate-y-4 transition-all duration-700 ease-out flex flex-col items-center" id="content-container">
<!-- Icon/Label -->
<div class="mb-md flex items-center gap-xs px-sm py-1 bg-surface-variant/30 rounded-full border border-border-subtle backdrop-blur-sm">
<span class="material-symbols-outlined text-[14px] text-primary" style="font-variation-settings: 'FILL' 1;">error</span>
<span class="font-mono-sm text-mono-sm text-text-secondary tracking-widest uppercase">System Error 404</span>
</div>
<!-- Large Numeral -->
<h1 class="error-numeral mb-base select-none">404</h1>
<!-- Heading -->
<h2 class="font-h1 text-h1 text-text-primary mb-sm tracking-tight">Page not found</h2>
<!-- Body -->
<p class="font-body text-body text-text-secondary max-w-[400px] mb-xl">
                This page doesn't exist or has been moved. The resource you are looking for is currently unavailable or the link might be broken.
            </p>
<!-- CTA Cluster -->
<div class="flex flex-col sm:flex-row items-center gap-md">
<a class="group relative flex items-center justify-center h-[42px] px-xl bg-primary-container text-on-primary-container font-h3 text-h3 rounded-xl transition-all duration-200 active:scale-95 hover:brightness-110 glow-effect" href="/dashboard">
                    Go to Dashboard
                    <span class="material-symbols-outlined ml-base text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</a>
<button class="h-[42px] px-xl text-text-secondary font-h3 text-h3 rounded-xl hover:bg-bg-elevated transition-colors duration-200 flex items-center gap-base" onclick="window.history.back()">
<span class="material-symbols-outlined text-[18px]">undo</span>
                    Go Back
                </button>
</div>
<!-- Technical Detail (Hidden on small screens) -->
<div class="mt-xl pt-lg border-t border-border-subtle w-full max-w-[280px]">
<div class="flex items-center justify-between text-mono-sm font-mono-sm text-text-muted">
<span>HOST_ID:</span>
<span class="text-text-secondary">CRM_NODE_04</span>
</div>
<div class="flex items-center justify-between text-mono-sm font-mono-sm text-text-muted mt-xs">
<span>TRACE_REF:</span>
<span class="text-text-secondary" id="trace-id">ERR-404-X892</span>
</div>
</div>
</div>
</main>
<!-- Branding Footer -->
<footer class="fixed bottom-lg left-0 right-0 flex justify-center z-10">
<div class="flex items-center gap-sm">
<span class="font-h2 text-h2 font-bold text-primary">Acme Corp</span>
<div class="h-4 w-[1px] bg-border-subtle"></div>
<span class="font-mono-sm text-mono-sm text-text-muted">Enterprise CRM Workspace</span>
</div>
</footer>
<script>
        // Simple entry animation
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('content-container');
            container.classList.remove('opacity-0', 'translate-y-4');
            
            // Random Trace ID Generation
            const traceElement = document.getElementById('trace-id');
            const randomID = 'ERR-404-' + Math.random().toString(36).substring(2, 6).toUpperCase();
            traceElement.textContent = randomID;
        });

        // Micro-interaction for the numeral
        const numeral = document.querySelector('.error-numeral');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            numeral.style.transform = `translate3d(${x}px, ${y}px, 0)`;
        });
    </script>
