<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        body {
            background-color: #0D0D0F; /* Layer 0 Base */
        }
        .login-card-gradient {
            background: linear-gradient(135deg, rgba(20, 20, 23, 1) 0%, rgba(28, 28, 33, 1) 100%);
        }
        .accent-bar {
            height: 2px;
            width: 100%;
            background: #4d9eff;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body class="font-body text-body text-text-primary min-h-screen flex items-center justify-center p-md">
<!-- Atmospheric Background Effect -->
<div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary-container/5 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-secondary-container/5 rounded-full blur-[120px]"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-[400px] relative">
<!-- The Card -->
<div class="login-card-gradient border border-border-subtle rounded-xl overflow-hidden relative shadow-2xl">
<!-- Contextual Accent Bar (Style Guidance) -->
<div class="accent-bar"></div>
<div class="p-xl flex flex-col gap-lg">
<!-- Brand Anchor Logic: Logo and Identity -->
<div class="flex flex-col items-center gap-base">
<div class="w-12 h-12 bg-primary-container rounded-xl flex items-center justify-center mb-xs shadow-lg shadow-primary-container/10">
<span class="material-symbols-outlined text-on-primary-container text-[28px]" style="font-variation-settings: 'FILL' 1;">business</span>
</div>
<h1 class="font-h1 text-h1 text-primary tracking-tight">Acme Corp</h1>
<p class="font-body text-body text-text-secondary">Enterprise CRM</p>
</div>
<!-- Form Heading -->
<div class="space-y-xs">
<h2 class="font-h2 text-h2 text-text-primary">Welcome back</h2>
<p class="font-small text-small text-text-muted">Enter your credentials to access your dashboard</p>
</div>
<!-- Login Form -->
<form action="/dashboard" class="flex flex-col gap-md">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-text-secondary uppercase" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-text-muted group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-[42px] bg-bg-elevated border border-border-subtle rounded-lg pl-xl pr-md font-body text-body text-text-primary placeholder:text-text-muted focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container/20 transition-all" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-text-secondary uppercase" for="password">Password</label>
<a class="font-small text-small text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-text-muted group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-[42px] bg-bg-elevated border border-border-subtle rounded-lg pl-xl pr-md font-body text-body text-text-primary placeholder:text-text-muted focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container/20 transition-all" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- CTA Section -->
<button class="mt-base w-full h-11 bg-primary-container text-on-primary-container font-h3 text-h3 rounded-lg flex items-center justify-center gap-xs hover:bg-primary-fixed-dim active:scale-[0.98] transition-all shadow-lg shadow-primary-container/10" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer Divider -->
<div class="relative py-base">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-border-subtle"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="px-md bg-bg-surface text-text-muted font-label-caps">OR CONTINUE WITH</span>
</div>
</div>
<!-- SSO Options -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center h-10 border border-border-subtle rounded-lg bg-bg-elevated hover:bg-surface-container-high transition-colors group">
<img alt="Google" class="w-5 h-5 grayscale group-hover:grayscale-0 transition-all mr-xs" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAmO8wBeLilJrLo_0RksVo-VFRvIrgLpDp_r26jS6vWT5ngjhe1TMPSpBrh_Zsy5JiIlEf7Oayc7K3_f3Y6X5FOBQDAIpVNJ9-q-QSpVaZ1vwsrpyGewAxhSHcptYeZxVOF8QZGG2UpubGuGHVb4KsBWA3h1Qi896wfbSFhNbUHEprywtcELSM8gr5qM38-5TzFfg904ViCFoqAiXKWJzveRpND4xl6UGpHzNKGYm2-No2hLv7J6xdk-wOHuLOgBs4SngEpMMF9zQ"/>
<span class="font-small text-small text-text-secondary">Google</span>
</button>
<button class="flex items-center justify-center h-10 border border-border-subtle rounded-lg bg-bg-elevated hover:bg-surface-container-high transition-colors group">
<span class="material-symbols-outlined text-text-secondary mr-xs text-[20px]" style="font-variation-settings: 'FILL' 1;">terminal</span>
<span class="font-small text-small text-text-secondary">SSO</span>
</button>
</div>
</div>
</div>
<!-- Secondary Navigation -->
<p class="text-center mt-xl font-body text-body text-text-secondary">
            Don't have an account? 
            <a class="text-primary font-medium hover:underline" href="/register">Request Access</a>
</p>
<!-- Technical Metadata Decoration (Style Guidance Influenced) -->
<div class="mt-xl flex justify-between items-center px-base opacity-40">
<div class="flex items-center gap-xs">
<div class="w-1.5 h-1.5 rounded-full bg-secondary"></div>
<span class="font-mono-sm text-mono-sm text-text-muted">SYSTEM_STABLE</span>
</div>
<span class="font-mono-sm text-mono-sm text-text-muted">v2.4.0-PRO</span>
</div>
</main>
<!-- Visual Polish: Floating Card Background Decoration -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] pointer-events-none opacity-20 -z-20">
<div class="absolute inset-0 bg-primary/5 rounded-full blur-[100px] animate-pulse"></div>
</div>
<script>
        // Simple Interaction Feedback
        document.querySelector('form').addEventListener('submit', function(e) {
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> Validating...`;
            
            // Artificial delay to simulate authentication
            setTimeout(() => {
                // In a real app, this would redirect
                console.log('Login initiated');
            }, 1000);
        });

        // Background atmosphere movement
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const lights = document.querySelectorAll('.fixed > div');
            lights[0].style.transform = `translate(${x * 20}px, ${y * 20}px)`;
            lights[1].style.transform = `translate(${-x * 20}px, ${-y * 20}px)`;
        });
    </script>
</body></html>
